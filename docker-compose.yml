version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - '8000:8000'
    environment:
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=3600
    volumes:
      - ./backend:/app
  frontend:
    build: ./frontend
    ports:
      - '3000:4173'
    depends_on:
      - backend
