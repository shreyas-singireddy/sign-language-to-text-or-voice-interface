[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "PL"]
ignore = [
    "PLR0913",
    "PLR0915",
    "PLR0912",
    "E501",      # Line too long
    "PLR2004",   # Magic value used in comparison
    "N815",      # Variable in class scope should not be mixedCase (camelCase)
    "E402",      # Module level import not at top of file
    "N806",      # Variable in function should be lowercase
    "PLW2901",   # for loop variable overwritten
    "PLW0603",   # global statement
    "N803",      # Argument name should be lowercase (allow matrix X)
    "E741",      # Ambiguous variable name 'l'
    "PLC0415",   # Allow import outside top-level (used for dependency isolation/circular imports)
    "UP042"      # Allow inheritance from (str, Enum) instead of StrEnum for compatibility
]

[tool.mypy]
python_version = "3.12"
warn_return_any = false
warn_unused_configs = true
ignore_missing_imports = true
check_untyped_defs = false
exclude = ["backend/app", "^validate_compliance\\.py$", "backend/\\.venv", "\\.venv"]
disable_error_code = [
    "var-annotated",
    "assignment",
    "return-value",
    "no-any-return",
    "import-untyped",
    "has-type",
    "misc",
    "type-arg",
    "union-attr",
    "attr-defined",
    "name-defined",
    "func-returns-value",
    "operator",
    "arg-type",
    "call-arg",
    "truthy-function"
]

[tool.pytest.ini_options]
minversion = "8.0"
addopts = "-ra -q --cov=ai_engine --cov=translation --cov=app --cov=speech --cov-fail-under=80"
testpaths = [
    "tests",
]
pythonpath = [
    "."
]

[tool.vulture]
exclude = [".venv", ".venv312", "node_modules", "frontend/node_modules"]
min_confidence = 80
paths = ["ai_engine", "translation", "app", "speech", "database", "emergency", "multilingual", "communication", "analytics", "conversation"]

[tool.pylint.MASTER]
ignore-paths = ["\\.venv/.*", "node_modules/.*"]
load-plugins = []

[tool.pylint.messages_control]
disable = [
    "raw-checker-failed",
    "bad-inline-option",
    "locally-disabled",
    "file-ignored",
    "suppressed-message",
    "useless-suppression",
    "deprecated-pragma",
    "use-symbolic-message-instead",
    "missing-docstring",
    "invalid-name"
]

[tool.pylint.format]
max-line-length = 120

[tool.black]
line-length = 120

[tool.coverage.run]
omit = [
    "app/pages/*",
    "app/main.py",
    "app/services/ai_service.py",
    "app/services/database_service.py",
    "ai_engine/vision/*",
    "ai_engine/services/*",
    "ai_engine/computer_vision/*",
    "ai_engine/datasets/*",
    "ai_engine/sequence_models/*",
    "ai_engine/gesture_recognition/dataset/*",
    "ai_engine/gesture_recognition/inference/predictor.py",
    "speech/providers/*",
    "speech/whisper_engine.py",
    "translation/providers/google_adapter.py",
    "emergency/panic_protocol.py",
    "tests/*"
]
