# ============================================================
# SignBridge AI — GitLab CI/CD Pipeline
# ============================================================
# Architecture:
#   lint → type_check → security → test → build → release
#
# Key design decisions:
#   • workflow: rules prevent duplicate push+MR pipelines
#   • GIT_CLEAN_FLAGS prevents long-path Windows cleanup failures
#   • pip cache via PIP_CACHE_DIR speeds up dependency installs
#   • flake8 / pylint removed (ruff covers them with no overlap)
#   • coverage merged into pytest stage (was running pytest twice)
#   • docker-build skipped on shell executor (no Docker daemon)
#   • All jobs use ci_bootstrap.py for cross-platform venv mgmt
# ============================================================

# ── Prevent duplicate pipelines ─────────────────────────────
# Run EITHER a branch push pipeline OR an MR pipeline, never both.
workflow:
  rules:
    # Always run on the default branch
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    # Run on MR pipelines
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    # Run on any non-MR branch push ONLY when there is no open MR for it
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH
    # Always run on tag pushes (for release)
    - if: $CI_COMMIT_TAG

# ── Global variables ─────────────────────────────────────────
variables:
  # pip cache directory (shared with GitLab cache)
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  # Skip long-path Windows venv cleanup that causes "Filename too long" errors.
  # We exclude backend/.venv and builds/ from git-clean so the runner
  # doesn't try to delete thousands of deep sklearn/jax files.
  GIT_CLEAN_FLAGS: "-ffdx --exclude=backend/.venv --exclude=.cache"
  # Use shallow clone for speed
  GIT_DEPTH: "20"

# ── Shared cache ─────────────────────────────────────────────
# Cache pip downloads and the venv between jobs & pipelines.
# Key on requirements files so it rebuilds when deps change.
cache:
  key:
    files:
      - backend/requirements.txt
      - requirements-dev.txt
  paths:
    - .cache/pip
    - backend/.venv
  policy: pull-push

# ── Bootstrap venv once per pipeline ─────────────────────────
# All jobs that need Python share this before_script.
.python_job: &python_job
  image: python:3.12-slim
  before_script:
    - python ci_bootstrap.py --bootstrap

# ── Pipeline stages ──────────────────────────────────────────
stages:
  - lint
  - type_check
  - security
  - test
  - build
  - release

# ════════════════════════════════════════════════════════════
# LINT STAGE — fast fail on style + format + lint errors
# ════════════════════════════════════════════════════════════

black-format-check:
  <<: *python_job
  stage: lint
  script:
    - python ci_bootstrap.py black --check .

ruff-check:
  <<: *python_job
  stage: lint
  script:
    # ruff covers flake8 + pylint rules with zero config overhead
    - python ci_bootstrap.py ruff check .
    - python ci_bootstrap.py ruff format --check .

# ════════════════════════════════════════════════════════════
# TYPE CHECK STAGE
# ════════════════════════════════════════════════════════════

mypy-type-check:
  <<: *python_job
  stage: type_check
  script:
    - python ci_bootstrap.py mypy .

# ════════════════════════════════════════════════════════════
# SECURITY STAGE — all security scanners in parallel
# ════════════════════════════════════════════════════════════

bandit-security:
  <<: *python_job
  stage: security
  script:
    # Exclude venv, cache, builds and frontend node_modules from bandit scan.
    # Scanning third-party packages inside .venv takes 15+ minutes and produces
    # only false positives from packages we don't own.
    - python ci_bootstrap.py bandit -r . -c pyproject.toml -lll

detect-secrets-check:
  <<: *python_job
  stage: security
  script:
    # Update baseline non-interactively, then fail if new secrets modified the file
    - python ci_bootstrap.py detect-secrets scan --baseline .secrets.baseline
    - git diff -I generated_at --exit-code .secrets.baseline

semgrep-security:
  stage: security
  # semgrep image ignored on Windows shell runner, but semgrep is globally installed
  before_script: []
  cache: []
  variables:
    GIT_CLEAN_FLAGS: "-ffdx -e backend/.venv/ -e .venv/"
  script:
    - semgrep scan --error --config auto
        --exclude backend/.venv --exclude .cache
        --exclude builds --exclude frontend/node_modules .
  allow_failure: false

gitleaks-security:
  stage: security
  before_script: []
  cache: []
  variables:
    GIT_CLEAN_FLAGS: "-ffdx -e backend/.venv/ -e .venv/"
  script:
    - Invoke-WebRequest -Uri "https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_windows_x64.zip" -OutFile gitleaks.zip
    - New-Item -ItemType Directory -Path ..\gitleaks_bin -Force
    - Expand-Archive gitleaks.zip -DestinationPath ..\gitleaks_bin -Force
    - ..\gitleaks_bin\gitleaks.exe detect --source=. --verbose --no-git

# ════════════════════════════════════════════════════════════
# TEST STAGE — unit tests + coverage in one run (was 2 runs)
# ════════════════════════════════════════════════════════════

pytest-suite:
  <<: *python_job
  stage: test
  script:
    # Single pytest run with coverage — previously run twice (test + coverage stages)
    - python ci_bootstrap.py pytest --cov --cov-fail-under=80 -q
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    when: always
    expire_in: 7 days

# ════════════════════════════════════════════════════════════
# BUILD STAGE — only on default branch or tags (not every MR)
# ════════════════════════════════════════════════════════════

docker-build-check:
  stage: build
  # Only run on the default branch or explicit tags to avoid
  # running a Docker build on every feature branch push.
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
    - when: never
  # Use docker:dind only on this specific job
  image: docker:26-cli
  services:
    - docker:26-dind
  variables:
    DOCKER_HOST: "tcp://docker:2376"
    DOCKER_TLS_CERTDIR: "/certs"
    # Override cache and git clean — no Python venv needed here
    GIT_CLEAN_FLAGS: "-ffdx"
  before_script: []
  cache: []
  script:
    - docker build --no-cache -t sign-bridge-ai:${CI_COMMIT_SHORT_SHA} .

# ════════════════════════════════════════════════════════════
# RELEASE STAGE — only on version tags
# ════════════════════════════════════════════════════════════

release-notify:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  before_script: []
  cache: []
  variables:
    GIT_CLEAN_FLAGS: "-ffdx"
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
  release:
    name: "Release $CI_COMMIT_TAG"
    description: "Automated release for $CI_COMMIT_TAG"
    tag_name: "$CI_COMMIT_TAG"
  rules:
    - if: $CI_COMMIT_TAG
