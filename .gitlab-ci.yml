# GitLab CI/CD Pipeline Configuration matching all 100% compliance checks
stages:
  - format
  - lint
  - type_check
  - security
  - audit
  - test
  - coverage
  - build
  - release

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip
    - backend/.venv

before_script:
  - python -m venv backend/.venv
  - source backend/.venv/bin/activate || backend\.venv\Scripts\activate.ps1 || .\backend\.venv\Scripts\activate
  - pip install --upgrade pip
  - pip install -r backend/requirements.txt
  - pip install -r requirements-dev.txt

# --- FORMAT STAGE ---
black-format-check:
  stage: format
  image: python:3.12-slim
  script:
    - black --check .

ruff-format-check:
  stage: format
  image: python:3.12-slim
  script:
    - ruff format --check .

pyupgrade-check:
  stage: format
  image: python:3.12-slim
  script:
    - pip install pyupgrade==3.15.2
    - find . -name "*.py" -not -path "./.venv/*" -not -path "./backend/.venv/*" -not -path "./node_modules/*" | xargs pyupgrade --py312-plus

# --- LINT STAGE ---
ruff-lint:
  stage: lint
  image: python:3.12-slim
  script:
    - ruff check .

flake8-lint:
  stage: lint
  image: python:3.12-slim
  script:
    - flake8 .

pylint-lint:
  stage: lint
  image: python:3.12-slim
  script:
    - pylint --recursive=y .

vulture-deadcode:
  stage: lint
  image: python:3.12-slim
  script:
    - vulture .

# --- TYPE CHECK STAGE ---
mypy-type-check:
  stage: type_check
  image: python:3.12-slim
  script:
    - mypy .

# --- SECURITY STAGE ---
bandit-security:
  stage: security
  image: python:3.12-slim
  script:
    - bandit -r .

semgrep-security:
  stage: security
  image: returntocorp/semgrep
  script:
    - semgrep scan --error --config auto .

gitleaks-security:
  stage: security
  image: zricethezav/gitleaks:latest
  script:
    - gitleaks detect --source=. --verbose

detect-secrets-security:
  stage: security
  image: python:3.12-slim
  script:
    - detect-secrets scan

# --- DEPENDENCY AUDIT STAGE ---
pip-audit:
  stage: audit
  image: python:3.12-slim
  script:
    - pip install pip-audit==2.7.2
    - pip-audit -r backend/requirements.txt --ignore-vuln GHSA-0000-0000-0000
  allow_failure: false

npm-audit:
  stage: audit
  image: node:20-slim
  script:
    - cd frontend
    - npm install
    - npm audit --audit-level=high
  allow_failure: false

# --- TEST STAGE ---
pytest-suite:
  stage: test
  image: python:3.12-slim
  script:
    - pytest

# --- COVERAGE STAGE ---
coverage-check:
  stage: coverage
  image: python:3.12-slim
  script:
    - pytest --cov --cov-fail-under=80

# --- BUILD STAGE ---
docker-build-check:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - docker build .

# --- RELEASE STAGE ---
release-notify:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  script:
    - echo "Release tagged"
  rules:
    - if: $CI_COMMIT_TAG
