stages:
  - format
  - lint
  - type_check
  - security
  - test
  - coverage
  - build
  - release

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  GIT_STRATEGY: clone

cache:
  key: pip-cache
  paths:
    - .cache/pip

default:
  image: python:3.12-slim

before_script:
  - python -m pip install --upgrade pip
  - pip install -r backend/requirements.txt
  - pip install -r requirements-dev.txt

# ---------------- FORMAT ----------------

black-format-check:
  stage: format
  script:
    - black --check .

ruff-format-check:
  stage: format
  script:
    - ruff format --check .

# ---------------- LINT ----------------

ruff-lint:
  stage: lint
  script:
    - ruff check .

flake8-lint:
  stage: lint
  script:
    - flake8 .

pylint-lint:
  stage: lint
  script:
    - pylint backend

# ---------------- TYPE CHECK ----------------

mypy-type-check:
  stage: type_check
  script:
    - mypy backend

# ---------------- SECURITY ----------------

bandit-security:
  stage: security
  script:
    - bandit -r backend

semgrep-security:
  stage: security
  image: returntocorp/semgrep:latest
  script:
    - semgrep scan --config auto --error

gitleaks-security:
  stage: security
  image: zricethezav/gitleaks:latest
  script:
    - gitleaks detect --source . --verbose

detect-secrets-security:
  stage: security
  script:
    - detect-secrets scan --all-files

# ---------------- TEST ----------------

pytest-suite:
  stage: test
  script:
    - pytest -v

# ---------------- COVERAGE ----------------

coverage-check:
  stage: coverage
  script:
    - pytest --cov=backend --cov-report=term-missing --cov-fail-under=80

# ---------------- BUILD ----------------

docker-build-check:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - docker build -t app:test .

# ---------------- RELEASE ----------------

release-notify:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  script:
    - echo "Release tagged"
  rules:
    - if: '$CI_COMMIT_TAG'