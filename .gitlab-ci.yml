# GitLab CI/CD Pipeline Configuration matching all 100% compliance checks
stages:
  - format
  - lint
  - type_check
  - security
  - test
  - coverage
  - build
  - release

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip
    - backend/.venv

before_script:
  - python ci_bootstrap.py --bootstrap

# --- FORMAT STAGE ---
black-format-check:
  stage: format
  image: python:3.12-slim
  script:
    - python ci_bootstrap.py black --check .

ruff-format-check:
  stage: format
  image: python:3.12-slim
  script:
    - python ci_bootstrap.py ruff format --check .

# --- LINT STAGE ---
ruff-lint:
  stage: lint
  image: python:3.12-slim
  script:
    - python ci_bootstrap.py ruff check .

flake8-lint:
  stage: lint
  image: python:3.12-slim
  script:
    - python ci_bootstrap.py flake8 .

pylint-lint:
  stage: lint
  image: python:3.12-slim
  script:
    - python ci_bootstrap.py pylint --recursive=y .

# --- TYPE CHECK STAGE ---
mypy-type-check:
  stage: type_check
  image: python:3.12-slim
  script:
    - python ci_bootstrap.py mypy .

# --- SECURITY STAGE ---
bandit-security:
  stage: security
  image: python:3.12-slim
  script:
    - python ci_bootstrap.py bandit -r .

semgrep-security:
  stage: security
  image: returntocorp/semgrep
  before_script: []
  script:
    - semgrep scan --error --config auto .

gitleaks-security:
  stage: security
  image: zricethezav/gitleaks:latest
  before_script: []
  script:
    - gitleaks detect --source=. --verbose

detect-secrets-security:
  stage: security
  image: python:3.12-slim
  script:
    - python ci_bootstrap.py detect-secrets scan

# --- TEST STAGE ---
pytest-suite:
  stage: test
  image: python:3.12-slim
  script:
    - python ci_bootstrap.py pytest

# --- COVERAGE STAGE ---
coverage-check:
  stage: coverage
  image: python:3.12-slim
  script:
    - python ci_bootstrap.py pytest --cov --cov-fail-under=80

# --- BUILD STAGE ---
docker-build-check:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script: []
  script:
    - docker build .

# --- RELEASE STAGE ---
release-notify:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  before_script: []
  script:
    - echo "Release tagged"
  rules:
    - if: $CI_COMMIT_TAG
