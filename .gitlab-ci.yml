# GitLab CI/CD Pipeline Configuration

stages:
  - lint
  - security
  - test
  - coverage
  - build
  - release

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip
    - backend/.venv

before_script:
  - python -m venv backend/.venv
  - source backend/.venv/bin/activate || backend\.venv\Scripts\activate.ps1 || .\backend\.venv\Scripts\activate
  - pip install --upgrade pip
  - pip install -r backend/requirements.txt
  - pip install -r requirements-dev.txt

# --- LINT STAGE ---
ruff-lint:
  stage: lint
  image: python:3.12-slim
  script:
    - ruff check .
  allow_failure: false

vulture-deadcode:
  stage: lint
  image: python:3.12-slim
  script:
    - vulture .
  allow_failure: false

# --- SECURITY STAGE ---
bandit-scan:
  stage: security
  image: python:3.12-slim
  script:
    - bandit -r . -f txt -o bandit-report.txt
  artifacts:
    paths:
      - bandit-report.txt
    expire_in: 1 week

semgrep-scan:
  stage: security
  image: returntocorp/semgrep
  variables:
    SEMGREP_RULES: p/security
  script:
    - semgrep scan --error --config auto .
  allow_failure: false

pip-audit-dependencies:
  stage: security
  image: python:3.12-slim
  script:
    - pip-audit
  allow_failure: false

# --- TEST STAGE ---
pytest-suite:
  stage: test
  image: python:3.12-slim
  script:
    - pytest tests/
  allow_failure: false

# --- COVERAGE STAGE ---
coverage-check:
  stage: coverage
  image: python:3.12-slim
  script:
    - pytest --cov=backend --cov=ai_engine --cov=translation --cov-report=xml --cov-report=term
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 1 week

# --- BUILD STAGE ---
docker-build:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - docker build -t signbridge-backend:latest ./backend
    - docker build -t signbridge-frontend:latest ./frontend
  only:
    - main
    - develop

# --- RELEASE STAGE ---
release-deploy:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  script:
    - echo "Releasing version $CI_COMMIT_TAG"
  rules:
    - if: $CI_COMMIT_TAG
