# GitLab CI/CD Pipeline Configuration — SignBridge AI
# All stages aligned to the 100% compliance checklist

stages:
  - format
  - lint
  - type_check
  - security
  - audit
  - test
  - coverage
  - build
  - release

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PIP_BREAK_SYSTEM_PACKAGES: "1"

cache:
  paths:
    - .cache/pip

# ---------------------------------------------------------------------------
# Shared Python install anchor (no venv — CI containers use system Python)
# ---------------------------------------------------------------------------
.python_setup: &python_setup
  before_script:
    - pip install --upgrade pip --quiet
    - pip install -r requirements-dev.txt --quiet

.python_with_backend: &python_with_backend
  before_script:
    - pip install --upgrade pip --quiet
    - pip install -r requirements-dev.txt --quiet
    - pip install -r backend/requirements.txt --quiet

# ===========================================================================
# FORMAT STAGE
# ===========================================================================
black-format-check:
  stage: format
  image: python:3.12-slim
  <<: *python_setup
  script:
    - black --check .
  allow_failure: false

ruff-format-check:
  stage: format
  image: python:3.12-slim
  <<: *python_setup
  script:
    - ruff format --check .
  allow_failure: false

pyupgrade-check:
  stage: format
  image: python:3.12-slim
  before_script:
    - pip install pyupgrade==3.15.2 --quiet
  script:
    - |
      find . -name "*.py" \
        -not -path "./.venv/*" \
        -not -path "./backend/.venv/*" \
        -not -path "./node_modules/*" \
        -not -path "./frontend/node_modules/*" \
        | xargs pyupgrade --py312-plus
  allow_failure: false

# ===========================================================================
# LINT STAGE
# ===========================================================================
ruff-lint:
  stage: lint
  image: python:3.12-slim
  <<: *python_setup
  script:
    - ruff check .
  allow_failure: false

flake8-lint:
  stage: lint
  image: python:3.12-slim
  <<: *python_setup
  script:
    - flake8 .
  allow_failure: false

pylint-lint:
  stage: lint
  image: python:3.12-slim
  <<: *python_with_backend
  script:
    - |
      pylint --recursive=y \
        --ignore=.venv,node_modules,frontend,backend/.venv \
        ai_engine translation app speech database emergency multilingual communication analytics conversation tests
  allow_failure: true   # pylint is advisory — strict scoring not blocking

vulture-deadcode:
  stage: lint
  image: python:3.12-slim
  <<: *python_setup
  script:
    - vulture .
  allow_failure: false

# ===========================================================================
# TYPE CHECK STAGE
# ===========================================================================
mypy-type-check:
  stage: type_check
  image: python:3.12-slim
  <<: *python_with_backend
  script:
    - mypy .
  allow_failure: false

# ===========================================================================
# SECURITY STAGE
# ===========================================================================
bandit-security:
  stage: security
  image: python:3.12-slim
  <<: *python_setup
  script:
    - bandit -r . --exclude .venv,backend/.venv,node_modules,frontend/node_modules
  allow_failure: false

semgrep-security:
  stage: security
  image: returntocorp/semgrep
  before_script: []
  script:
    - semgrep scan --error --config auto .
  allow_failure: true   # semgrep may report advisory findings; non-blocking

gitleaks-security:
  stage: security
  image: zricethezav/gitleaks:latest
  before_script: []
  script:
    - gitleaks detect --source=. --verbose --no-git
  allow_failure: true   # gitleaks can have false positives in test fixtures

detect-secrets-security:
  stage: security
  image: python:3.12-slim
  before_script:
    - pip install detect-secrets==1.5.0 --quiet
  script:
    - detect-secrets scan --baseline .secrets.baseline
  allow_failure: true   # baseline-driven; advisory only

# ===========================================================================
# AUDIT STAGE
# ===========================================================================
pip-audit:
  stage: audit
  image: python:3.12-slim
  before_script:
    - pip install pip-audit==2.7.2 --quiet
  script:
    - pip-audit -r backend/requirements.txt
  allow_failure: false

npm-audit:
  stage: audit
  image: node:20-slim
  before_script: []
  script:
    - cd frontend
    - npm ci --prefer-offline || npm install
    - npm audit --audit-level=high
  allow_failure: false

# ===========================================================================
# TEST STAGE
# ===========================================================================
pytest-suite:
  stage: test
  image: python:3.12-slim
  <<: *python_with_backend
  script:
    - pytest -q
  allow_failure: false

# ===========================================================================
# COVERAGE STAGE
# ===========================================================================
coverage-check:
  stage: coverage
  image: python:3.12-slim
  <<: *python_with_backend
  script:
    - pytest --cov --cov-fail-under=80
  coverage: '/TOTAL.*\s+(\d+%)$/'
  allow_failure: false

# ===========================================================================
# BUILD STAGE
# ===========================================================================
docker-build-check:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script: []
  script:
    - docker build -t signbridge-ai:ci .
  allow_failure: true   # Docker-in-Docker requires privileged runners

# ===========================================================================
# RELEASE STAGE
# ===========================================================================
release-notify:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  before_script: []
  script:
    - echo "Release tagged at $CI_COMMIT_TAG"
  rules:
    - if: $CI_COMMIT_TAG
